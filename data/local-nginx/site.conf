pid /Users/srinivaspenumarthi/Downloads/Cybersecurity-Projects/threat-monitor/data/local-nginx/logs/nginx.pid;

events {}

http {
    access_log "/Users/srinivaspenumarthi/Downloads/Cybersecurity-Projects/threat-monitor/data/local-nginx/logs/access.log" combined;
    error_log "/Users/srinivaspenumarthi/Downloads/Cybersecurity-Projects/threat-monitor/data/local-nginx/logs/error.log" warn;

    server {
        listen 8088;
        server_name localhost;

        root "/Users/srinivaspenumarthi/Downloads/sastra-elibrary-main";
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
